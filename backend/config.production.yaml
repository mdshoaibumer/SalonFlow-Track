app:
  name: "SalonFlow Track"
  environment: "production"

server:
  host: "127.0.0.1"
  port: "8090"
  read_timeout_sec: 15
  write_timeout_sec: 15
  shutdown_timeout_sec: 5

database:
  path: "data/salonflow.db"
  migration_dir: "migrations"
  max_open_conns: 1

log:
  level: "info"
  format: "json"
  output: "file"
  file_path: "logs/salonflow.log"
  max_size_mb: 50
  max_backups: 5
  max_age_days: 90
  compress: true
